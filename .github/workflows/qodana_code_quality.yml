name: Telegram Notifications

on:
  push:
  pull_request:
    types: [opened, closed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram Messages
        run: |
          # Determine the message based on the event
          MESSAGE=""

          if [[ "${{ github.event_name }}" == "push" ]]; then
            MESSAGE="🚀 ${GITHUB_ACTOR} pushed code to ${{ github.repository }}"
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if [[ "${{ github.event.action }}" == "opened" ]]; then
              MESSAGE="📌 ${GITHUB_ACTOR} opened a PR: ${{ github.event.pull_request.title }}"
            fi

            if [[ "${{ github.event.action }}" == "closed" ]]; then
              if [[ "${{ github.event.pull_request.merged }}" == "true" ]]; then
                MESSAGE="✅ PR merged by ${GITHUB_ACTOR}: ${{ github.event.pull_request.title }}"
              else
                MESSAGE="❌ PR closed without merge: ${{ github.event.pull_request.title }}"
              fi
            fi
          fi

          # List of all chat IDs (from secrets)
          CHAT_IDS=(
            "${{ secrets.TELEGRAM_CHAT_ID }}"
            "${{ secrets.TELEGRAM_CHAT_ID_GROUP }}"
            "${{ secrets.TELEGRAM_CHAT_ID_PUTHIK }}"
            "${{ secrets.TELEGRAM_CHAT_ID_SOVANNRA }}"
            "${{ secrets.TELEGRAM_CHAT_ID_TOLA }}"
            "${{ secrets.TELEGRAM_CHAT_ID_VANNA }}"
          )

          # Send the message to all chat IDs
          for id in "${CHAT_IDS[@]}"; do
            curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
              -d chat_id=$id \
              -d text="$MESSAGE"
          done