services:
  rustfs:
    image: rustfs/rustfs:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      RUSTFS_ACCESS_KEY: admin
      RUSTFS_SECRET_KEY: password
    volumes:
      - rustfs-data:/data

  postgres:
    image: postgres:15
    container_name: postgres-otp
    environment:
      POSTGRES_DB: otp_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres-man-123
    ports:
      - "5432:5432"

  redis:
    image: redis:latest
    container_name: redis-otp
    ports:
      - "6379:6379"

volumes:
  rustfs-data: